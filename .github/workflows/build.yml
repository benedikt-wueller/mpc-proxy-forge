name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            archive: windows
            nodeExe: node.exe
            launcher: mpc-proxy-forge.cmd

          - os: ubuntu-latest
            archive: linux
            nodeExe: node
            launcher: mpc-proxy-forge

          - os: macos-latest
            archive: macos
            nodeExe: node
            launcher: mpc-proxy-forge

    runs-on: ${{ matrix.os }}

    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release folder
        shell: bash
        run: |
          mkdir release

      - name: Install production dependencies
        shell: bash
        run: |
          cp package.json release/
          cp package-lock.json release/
          cd release
          npm ci --omit=dev

      - name: Copy bundle
        shell: bash
        run: |
          mkdir -p release/dist
          cp dist/bundle.js release/dist/

      - name: Copy Node runtime
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "$(which node)" release/node
          chmod +x release/node

      - name: Copy Node runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "$env:RUNNER_TOOL_CACHE\node\*\x64\node.exe" release\node.exe

      - name: Create launcher (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cat > release/mpc-proxy-forge <<'EOF'
          #!/bin/sh
          DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          exec "$DIR/node" "$DIR/dist/index.js" "$@"
          EOF
          chmod +x release/mpc-proxy-forge

      - name: Create launcher (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @'
          @echo off
          "%~dp0\node.exe" "%~dp0\dist\index.js" %*
          '@ | Set-Content release\mpc-proxy-forge.cmd

      - name: Archive
        shell: bash
        run: |
          cd release
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell Compress-Archive * ../mpc-proxy-forge-${{ matrix.archive }}.zip
          else
            zip -r ../mpc-proxy-forge-${{ matrix.archive }}.zip .
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mpc-proxy-forge-${{ matrix.archive }}.zip