name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            launcher: mpc-proxy-forge.cmd

          - os: ubuntu-latest
            platform: linux-x64
            launcher: mpc-proxy-forge

          - os: macos-latest
            platform: macos-arm64

    runs-on: ${{ matrix.os }}

    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release directory
        shell: bash
        run: |
          mkdir release

          cp package.json release/
          cp package-lock.json release/

          cp -R dist release/

      - name: Install production dependencies
        shell: bash
        run: |
          cd release
          npm ci --omit=dev

      - name: Cleanup release
        shell: bash
        run: |
          rm release/package-lock.json

      ##########################################################
      # Windows
      ##########################################################

      - name: Prepare Windows runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (node -p "process.execPath") release\node.exe

          @'
          @echo off
          "%~dp0\node.exe" "%~dp0\dist\index.js" %*
          '@ | Set-Content release\mpc-proxy-forge.cmd

      ##########################################################
      # Linux / macOS
      ##########################################################

      - name: Prepare Unix runtime
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "$(node -p 'process.execPath')" release/node

          chmod +x release/node

          cat > release/mpc-proxy-forge <<'EOF'
          #!/bin/sh
          DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          exec "$DIR/node" "$DIR/dist/index.js" "$@"
          EOF

          chmod +x release/mpc-proxy-forge

      ##########################################################
      # Archive
      ##########################################################

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path release\* `
            -DestinationPath mpc-proxy-forge-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - name: Create ZIP (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd release
          zip -r "../mpc-proxy-forge-${{ github.ref_name }}-${{ matrix.platform }}.zip" .

      ##########################################################
      # Release
      ##########################################################

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpc-proxy-forge-${{ matrix.platform }}
          path: mpc-proxy-forge-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mpc-proxy-forge-${{ github.ref_name }}-${{ matrix.platform }}.zip